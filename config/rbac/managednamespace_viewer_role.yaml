# This rule is not used by the project namespace-provisioner itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to platform.platform.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: namespace-provisioner
    app.kubernetes.io/managed-by: kustomize
  name: managednamespace-viewer-role
rules:
- apiGroups:
  - platform.platform.io
  resources:
  - managednamespaces
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - platform.platform.io
  resources:
  - managednamespaces/status
  verbs:
  - get
